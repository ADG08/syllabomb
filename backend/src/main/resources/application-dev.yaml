spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/syllabomb
    username: syllabomb
    password: syllabomb
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: dev-secret-key
  expiration: 86400000

logging:
  level:
    andredr.tech.syllabomb: DEBUG